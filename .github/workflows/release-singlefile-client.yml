name: Release standalone client

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  release-client:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone client
        run: npm run build:client

      - name: Prepare artifact
        run: |
          cd dist
          FILE_COUNT=$(find . -type f | wc -l)

          if [ "$FILE_COUNT" -eq 1 ]; then
            FILE_NAME=$(find . -type f | head -n 1)
            BASENAME=$(basename "$FILE_NAME")
            cp "$FILE_NAME" "../$BASENAME"
            echo "ARTIFACT=$BASENAME" >> $GITHUB_ENV
          else
            zip -r ../artifact.zip .
            echo "ARTIFACT=artifact.zip" >> $GITHUB_ENV
          fi

      - name: Run npm audit
        run: |
          npm audit >> audit.txt || true

      - name: Get commit info
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          COMMIT_SUMMARY=$(git log -1 --pretty=%s)
          COMMIT_BODY=$(git log -1 --pretty=%b | tr '\n' ' ' | tr -s ' ')
          echo "COMMIT_SUMMARY=$COMMIT_SUMMARY" >> $GITHUB_ENV
          echo "COMMIT_BODY=$COMMIT_BODY" >> $GITHUB_ENV

      - name: Combine release body
        run: |
          echo "${COMMIT_BODY:-$COMMIT_SUMMARY}" > release_body.txt
          echo "" >> release_body.txt
          echo "---" >> release_body.txt
          cat audit.txt >> release_body.txt

      - name: Create GitHub Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b
        with:
          tag: ${{ env.SHORT_SHA }}
          name: "Release ${{ env.SHORT_SHA }} - ${{ env.COMMIT_SUMMARY }}"
          bodyFile: release_body.txt
          draft: false
          prerelease: false
          artifacts: ${{ env.ARTIFACT }}
          generateReleaseNotes: true
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old releases, tags and runs (keep last 3)
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)

          echo "Fetching releases..."

          releases=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/releases?per_page=100")

          echo "$releases" | jq -r '.[] | "\(.id) \(.tag_name)"' > releases.txt

          total=$(wc -l < releases.txt)
          echo "Total releases: $total"

          if [ "$total" -le 3 ]; then
            echo "Nothing to delete (releases)"
          else
            echo "$releases" | jq -r '.[] | "\(.id) \(.tag_name)"' | tail -n +4 | while read id tag; do
              echo "Deleting release: $id ($tag)"

              # delete release
              curl -s -X DELETE \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$OWNER/$REPO/releases/$id"

              curl -s -X DELETE \
                -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/$OWNER/$REPO/git/refs/tags/$tag" || true
            done
          fi

          echo "Fetching workflow runs..."

          runs=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/actions/runs?per_page=100")

          echo "$runs" | jq -r '.workflow_runs[] | "\(.id)"' > runs.txt

          total_runs=$(wc -l < runs.txt)
          echo "Total runs: $total_runs"

          if [ "$total_runs" -le 3 ]; then
            echo "Nothing to delete (runs)"
          else
            echo "$runs" | jq -r '.workflow_runs[] | "\(.id)"' | tail -n +4 | while read run_id; do
              echo "Deleting workflow run: $run_id"

              curl -s -X DELETE \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$OWNER/$REPO/actions/runs/$run_id"
            done
          fi