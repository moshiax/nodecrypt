name: Release standalone client

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-client:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone client
        run: npm run build:client

      - name: Prepare artifact
        run: |
          cd dist
          FILE_COUNT=$(find . -type f | wc -l)
          if [ "$FILE_COUNT" -eq 1 ]; then
            FILE_NAME=$(find . -type f)
            cp "$FILE_NAME" ../artifact
          else
            zip -r ../artifact.zip .
          fi

      - name: Get commit info
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          COMMIT_SUMMARY=$(git log -1 --pretty=%s)
          COMMIT_BODY=$(git log -1 --pretty=%b | tr '\n' ' ' | tr -s ' ')
          echo "COMMIT_SUMMARY=$COMMIT_SUMMARY" >> $GITHUB_ENV
          echo "COMMIT_BODY=$COMMIT_BODY" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b
        with:
          tag: ${{ env.SHORT_SHA }}
          name: "Release ${{ env.SHORT_SHA }} - ${{ env.COMMIT_SUMMARY }}"
          body: ${{ env.COMMIT_BODY != '' && env.COMMIT_BODY || env.COMMIT_SUMMARY }}
          draft: false
          prerelease: false
          artifacts: artifact,artifact.zip
          generateReleaseNotes: true
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}